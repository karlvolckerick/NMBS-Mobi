# Pre-commit hooks configuration
# https://pre-commit.com/

repos:
  - repo: local
    hooks:
      - id: lock
        name: lock
        entry: task lock
        language: system
        pass_filenames: false
        files: (pyproject\.toml|uv\.lock)$

      - id: lint
        name: lint
        entry: task lint
        language: system
        pass_filenames: false
        types: [python]

      - id: format
        name: format
        entry: task format
        language: system
        pass_filenames: false
        types: [python]
